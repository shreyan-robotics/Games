<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎣 Fishing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #4A90E2 50%, #2E5C8A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
 
        h1 {
            color: #2E5C8A;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
 
        .score {
            font-size: 1.5em;
            color: #2E5C8A;
            margin: 20px 0;
            font-weight: bold;
        }
 
        .game-area {
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
 
        .message {
            font-size: 1.3em;
            margin: 20px 0;
            color: #333;
            min-height: 60px;
        }
 
        .fish-display {
            font-size: 4em;
            margin: 20px 0;
            animation: bounce 0.5s ease;
        }
 
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
 
        button {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
 
        button:hover {
            background: #357ABD;
            transform: scale(1.05);
        }
 
        button:active {
            transform: scale(0.95);
        }
 
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: scale(1);
        }
 
        .catch-button {
            background: #FF6B6B;
            font-size: 1.5em;
            padding: 20px 60px;
            animation: pulse 0.5s ease infinite;
        }
 
        .catch-button:hover {
            background: #FF5252;
        }
 
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
 
        .result {
            font-size: 1.4em;
            font-weight: bold;
            margin: 20px 0;
        }
 
        .success {
            color: #4CAF50;
        }
 
        .failure {
            color: #FF6B6B;
        }
 
        .timer-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
 
        .timer-fill {
            height: 100%;
            background: linear-gradient(to right, #4CAF50, #FFC107, #FF6B6B);
            width: 100%;
            transition: width linear;
        }
 
        .instructions {
            color: #666;
            margin: 20px 0;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎣 Fishing Game</h1>
        <div class="score">Score: <span id="score">0</span></div>
        
        <div class="instructions">
            Cast your line and click the button when a fish bites!<br>
            You have <strong>0.5 seconds</strong> to react!<br>
            <span style="color: #FF6B6B; font-size: 0.9em;">⚠️ No holding allowed - you must click AFTER the fish appears!</span>
        </div>
 
        <div class="game-area">
            <div class="message" id="message">Ready to fish?</div>
            <div class="fish-display" id="fish"></div>
            <div class="timer-bar" id="timerBar">
                <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="result" id="result"></div>
        </div>
 
        <button id="actionButton">🎣 Cast Line</button>
    </div>
 
    <script>
        const fishTypes = [
            "🐟 Bass",
            "🐠 Clownfish", 
            "🐡 Pufferfish",
            "🦈 Shark",
            "🐙 Octopus",
            "🦑 Squid"
        ];
 
        let score = 0;
        let gameState = 'ready'; // ready, waiting, biting
        let biteTime = 0;
        let inputWasDownBeforeBite = false; // Track if button/key was held BEFORE fish appeared
        let hasClickedAfterBite = false; // Track if they've clicked since fish appeared
 
        // Track current input states
        let mouseCurrentlyDown = false;
        let keyCurrentlyDown = false;
 
        const button = document.getElementById('actionButton');
 
        function castLine() {
            gameState = 'waiting';
            document.getElementById('message').textContent = 'Line cast! Waiting for a bite...';
            document.getElementById('fish').textContent = '';
            document.getElementById('result').textContent = '';
            button.disabled = true;
            document.getElementById('timerBar').style.display = 'none';
 
            // Random wait time between 2-6 seconds
            const waitTime = Math.random() * 4000 + 2000;
 
            setTimeout(() => {
                fishBites();
            }, waitTime);
        }
 
        function fishBites() {
            gameState = 'biting';
            const fish = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            
            // CRITICAL: Check if input was already down when fish appeared
            inputWasDownBeforeBite = mouseCurrentlyDown || keyCurrentlyDown;
            hasClickedAfterBite = false;
            
            document.getElementById('message').textContent = '⚡ A fish is biting! CLICK FAST!';
            document.getElementById('fish').textContent = fish;
            button.textContent = '🎯 CATCH!';
            button.disabled = false;
            button.className = 'catch-button';
            
            // Show and animate timer bar
            document.getElementById('timerBar').style.display = 'block';
            const timerFill = document.getElementById('timerFill');
            timerFill.style.transition = 'width 0.5s linear';
            timerFill.style.width = '100%';
            
            setTimeout(() => {
                timerFill.style.width = '0%';
            }, 10);
 
            biteTime = Date.now();
 
            // Auto-fail after 0.5 seconds
            setTimeout(() => {
                if (gameState === 'biting') {
                    missedFish(fish);
                }
            }, 500);
        }
 
        function attemptCatch() {
            if (gameState !== 'biting') return;
            
            // Prevent multiple catches
            if (hasClickedAfterBite) return;
            hasClickedAfterBite = true;
            
            const reactionTime = (Date.now() - biteTime) / 1000;
            const fish = document.getElementById('fish').textContent;
 
            // Check if they were cheating by holding before fish appeared
            if (inputWasDownBeforeBite) {
                document.getElementById('result').innerHTML = `<span class="failure">❌ CHEATER! You were holding before the fish! The ${fish} got away!</span>`;
                document.getElementById('message').textContent = 'No holding allowed!';
                resetGame();
                return;
            }
 
            // Legitimate catch attempt
            if (reactionTime <= 0.5) {
                score++;
                document.getElementById('score').textContent = score;
                document.getElementById('result').innerHTML = `<span class="success">✅ You caught the ${fish}! Nice catch! (${reactionTime.toFixed(3)}s)</span>`;
                document.getElementById('message').textContent = 'Great job!';
            } else {
                document.getElementById('result').innerHTML = `<span class="failure">❌ Too slow! The ${fish} got away! (${reactionTime.toFixed(3)}s)</span>`;
                document.getElementById('message').textContent = 'Better luck next time!';
            }
 
            resetGame();
        }
 
        function missedFish(fish) {
            if (hasClickedAfterBite) return; // Already handled
            
            document.getElementById('result').innerHTML = `<span class="failure">❌ Too slow! The ${fish} got away!</span>`;
            document.getElementById('message').textContent = 'Better luck next time!';
            resetGame();
        }
 
        function resetGame() {
            gameState = 'ready';
            button.textContent = '🎣 Cast Line';
            button.disabled = false;
            button.className = '';
            document.getElementById('timerBar').style.display = 'none';
            
            setTimeout(() => {
                document.getElementById('fish').textContent = '';
            }, 2000);
        }
 
        // Mouse tracking
        button.addEventListener('mousedown', (e) => {
            mouseCurrentlyDown = true;
        });
 
        button.addEventListener('mouseup', (e) => {
            mouseCurrentlyDown = false;
        });
 
        // Click handler
        button.addEventListener('click', (e) => {
            if (gameState === 'ready') {
                castLine();
            } else if (gameState === 'biting') {
                attemptCatch();
            }
        });
 
        // Keyboard tracking
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (e.repeat) return; // Ignore key repeat
                keyCurrentlyDown = true;
            }
        });
 
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                keyCurrentlyDown = false;
                
                // Trigger action on key release
                if (!button.disabled) {
                    if (gameState === 'ready') {
                        castLine();
                    } else if (gameState === 'biting') {
                        attemptCatch();
                    }
                }
            }
        });
 
        // Track when mouse leaves button
        button.addEventListener('mouseleave', () => {
            mouseCurrentlyDown = false;
        });
 
        // Track focus loss
        window.addEventListener('blur', () => {
            mouseCurrentlyDown = false;
            keyCurrentlyDown = false;
        });
    </script>
</body>
</html>
